# Single source of truth for packages on every machine.
# Editing this file makes the package script re-run on the next `chezmoi apply`.
#
# Profile split: `gamedev`-suffixed lists only install on gamedev-profile
# machines (Godot, art, media). `ai`-suffixed lists install on every profile
# EXCEPT coding-noai (Claude Code and its MCP-server runtimes). Everything
# else installs on every profile, so keep work-computer-safe
# (programming/utility) packages there.
packages:
  dnf:
    # All Fedora machines (desktop + WSL)
    common:
      - gcc
      - make
      - git
      - gh # GitHub CLI
      - glab # GitLab CLI
      - just # command runner (justfiles)
      - ripgrep
      - fd-find
      - unzip
      - neovim
      - powerline-fonts
      - fastfetch
      - p7zip
      - zsh # default interactive shell (oh-my-zsh)
      - tmux # multiplexer (oh-my-tmux); zsh launches into it on login
    # All Fedora machines, every profile except coding-noai
    ai:
      - nodejs # runs the npx-based MCP servers in claude.yaml
      - npm
    # Fedora GNOME desktop only
    gui:
      - firefox
      - gparted
      - gnome-tweaks
      - input-remapper
      - seahorse
      - gnome-extensions-app
      - gnome-shell-extension-appindicator
      - gnome-shell-extension-caffeine
      - pipx # for gnome-extensions-cli
    # Fedora GNOME desktop, gamedev profile only
    gui_gamedev:
      - dotnet-sdk-8.0 # for Godot .NET builds
  # Debian headless server (names differ from Fedora on purpose)
  apt:
    common:
      - build-essential
      - git
      - gh # GitHub CLI
      - glab # GitLab CLI
      - just # command runner (justfiles)
      - curl
      - ripgrep
      - fd-find
      - unzip
      - neovim
      - fonts-powerline
      - fastfetch
      - p7zip-full
      - zsh # default interactive shell (oh-my-zsh)
      - tmux # multiplexer (oh-my-tmux); zsh launches into it on login
    # Every profile except coding-noai
    ai:
      - nodejs # runs the npx-based MCP servers in claude.yaml
      - npm
  flatpak:
    # Fedora GNOME desktop, every profile (system-wide)
    gui:
      # - org.mozilla.firefox # using dnf firefox
      - it.mijorus.gearlever
      - io.github.flattool.Warehouse
      - io.github.peazip.PeaZip
      - com.github.tchx84.Flatseal
      - md.obsidian.Obsidian
      - com.visualstudio.code
    # Fedora GNOME desktop, gamedev profile only (art/media/entertainment)
    gui_gamedev:
      - org.gimp.GIMP
      - com.github.PintaProject.Pinta
      - com.github.johnfactotum.Foliate
      - com.github.unrud.VideoDownloader
      - org.videolan.VLC
      - com.stremio.Stremio
      - com.obsproject.Studio
      - org.audacityteam.Audacity
      - org.gnome.NetworkDisplays
    # Steam Deck (user scope — survives SteamOS updates, no sudo)
    deck:
      - io.neovim.nvim
  choco:
    # All Windows machines
    common:
      - chezmoi # permanent install; the README one-liner only fetches a throwaway copy
      - nerd-fonts-cascadiacode # powerline/nerd glyphs for oh-my-zsh in WSL; Terminal config uses it
      - psmux # native-Windows tmux (reads ~/.psmux.conf); WSL gets real tmux
      - autohotkey
      - git
      - gh # GitHub CLI
      - glab # GitLab CLI
      - just # command runner (justfiles)
      - 7zip
      - firefox
      - obsidian
      - vscode
      # - files # "Files" community file manager - uncomment if wanted
    # Windows, every profile except coding-noai
    ai:
      - nodejs-lts # runs the npx-based MCP servers in claude.yaml
    # Windows, gamedev profile only (art/media/entertainment — mirrors
    # flatpak.gui_gamedev; Foliate/VideoDownloader/NetworkDisplays are
    # Linux-only, and Godot comes from godot-update.ps1, not choco)
    gamedev:
      - gimp
      - pinta
      - vlc
      - stremio
      - obs-studio
      - audacity
  gnome_extensions:
    - ddterm@amezin.github.com # https://extensions.gnome.org/extension/3780/ddterm/
    - hotedge@jonathan.jdoda.ca # https://extensions.gnome.org/extension/4222/hot-edge/
    - tilingshell@ferrarodomenico.com # https://extensions.gnome.org/extension/7065/tiling-shell/
