# psmux - native-Windows terminal multiplexer (github.com/psmux/psmux), a tmux
# clone in Rust, installed by Chocolatey. psmux reads ~/.psmux.conf before
# ~/.tmux.conf, so this file is what it picks up.
#
# Why this isn't just oh-my-tmux: oh-my-tmux builds its status bar by piping its
# own config back through sh/sed/awk/perl (`cut -c3- "$TMUX_CONF" | sh`), and
# none of that exists on native Windows. So the agnoster look that
# ~/.tmux.conf.local produces on Linux and WSL is reproduced here by hand, in
# the plain tmux syntax psmux does speak. Keep the two in sync by eye.
#
# Same role -> colour mapping as the zsh agnoster prompt:
#   blue   where you are      (current window)
#   green  who you are        (hostname)
#   yellow something wants you (prefix, messages)
#   grey   ambient chrome     (session, clock)
#
# Colours are ANSI names so they resolve through the Windows Terminal palette,
# the same way agnoster's prompt segments do.
#
# No powerline chevrons: each badge is a pill - a colour block with a round cap at
# each end (U+E0B6, U+E0B4) on a bar that paints no background of its own
# ("bg=default"), so the caps sit straight on the terminal's background. Items
# inside a pill are divided by a vertical bar (U+2502). Matches ~/.tmux.conf.local.
#
# The glyphs are literal, not \uXXXX escapes - that decoding is oh-my-tmux's, and
# psmux has none. Keep this file UTF-8; Cascadia Code Nerd Font renders them.

set -g mouse on
set -g base-index 1
set -g renumber-windows on

# Terminal/tab title: where we are and what's running. Same as ~/.tmux.conf.local
# - the hostname and session name a default title shows tell us nothing the
# status bar doesn't already.
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path} · #{pane_current_command}"

# Alt + h/j/k/l moves focus between panes, vim-style, with no prefix key.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Add ctrl and the same h/l move between windows (the "tabs") instead of panes;
# ctrl+alt+n opens a new one.
bind-key -n C-M-h previous-window
bind-key -n C-M-l next-window
bind-key -n C-M-n new-window

# Alt+- splits below, alt+_ splits to the right, both in the current directory.
bind-key -n M-- split-window -v -c "#{pane_current_path}"
bind-key -n M-_ split-window -h -c "#{pane_current_path}"

# --- status bar ---------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#8a8a8a,bg=default"

# Left: the session, as one grey pill - cap + body + cap, the caps drawn in the
# body's background colour against the bar's nothing.
#
# The "#[default]" before each closing cap clears the bold the body set, so a
# terminal that brightens bold text can't draw the cap a lighter shade than its
# pill. That works here because "#[default]" means "back to status-style", which
# isn't bold - not so for the current window below, whose style is.
set -g status-left "#[fg=#303030]#[fg=#e4e4e4,bg=#303030,bold] ❐ #S #[default]#[fg=#303030]#[default] "
set -g status-left-length 40

# Right: clock and date on grey, then the host on green (agnoster's clean-git
# badge). No username segment: psmux has no #{user} variable, and #H is the one
# identity format it documents. No battery either - psmux documents no battery
# format variable, so the Linux bar has one and this one doesn't.
# Clock is 12-hour (%I:%M %p) to match ~/.tmux.conf.local.
set -g status-right "#[fg=#8a8a8a]#{?client_prefix,⌨ ,}#[fg=#303030]#[fg=#e4e4e4,bg=#303030] %I:%M %p │ %d %b #[default]#[fg=#303030] #[fg=green]#[fg=black,bg=green,bold] #H #[default]#[fg=green]#[default]"
set -g status-right-length 80

# --- windows ------------------------------------------------------------------
# The current window is the blue pill; the others get none, so the eye has one
# thing to land on. Two traps in the style below, which is the *starting* style
# for the format: bg has to be default, or the opening cap would be blue on blue
# and vanish; and the caps spell out ",none" rather than leaning on "#[default]"
# like the ones above, because "#[default]" would revert into this style's bold
# and a bold-is-bright terminal would draw them bright blue on a normal-blue pill.
setw -g window-status-separator ""
setw -g window-status-style "fg=#8a8a8a,bg=default"
setw -g window-status-format " #I #W "
setw -g window-status-current-style "fg=black,bg=default,bold"
setw -g window-status-current-format "#[fg=blue,bg=default,none]#[fg=black,bg=blue,bold] #I #W #[fg=blue,bg=default,none]"

# --- panes and messages -------------------------------------------------------
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=blue"
set -g message-style "fg=black,bg=yellow,bold"
