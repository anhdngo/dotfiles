# psmux - native-Windows terminal multiplexer (github.com/psmux/psmux), a tmux
# clone in Rust, installed by Chocolatey. psmux reads ~/.psmux.conf before
# ~/.tmux.conf, so this file is what it picks up.
#
# Why this isn't just oh-my-tmux: oh-my-tmux builds its status bar by piping its
# own config back through sh/sed/awk/perl (`cut -c3- "$TMUX_CONF" | sh`), and
# none of that exists on native Windows. So the agnoster look that
# ~/.tmux.conf.local produces on Linux and WSL is reproduced here by hand, in
# the plain tmux syntax psmux does speak. Keep the two in sync by eye.
#
# Same role -> colour mapping as the zsh agnoster prompt:
#   blue   where you are      (current window)
#   green  who you are        (hostname)
#   yellow something wants you (prefix, messages)
#   grey   ambient chrome     (session, clock)
#
# Colours are ANSI names so they resolve through the Windows Terminal palette,
# the same way agnoster's prompt segments do.
#
# No powerline chevrons: the badges are flat colour blocks that abut, and items
# inside a badge are divided by a plain vertical bar (U+2502). Matches
# ~/.tmux.conf.local - keep the two in step.

set -g mouse on
set -g base-index 1
set -g renumber-windows on

# Terminal/tab title: where we are and what's running. Same as ~/.tmux.conf.local
# - the hostname and session name a default title shows tell us nothing the
# status bar doesn't already.
set -g set-titles on
set -g set-titles-string "#{b:pane_current_path} · #{pane_current_command}"

# Alt + h/j/k/l moves focus between panes, vim-style, with no prefix key.
bind-key -n M-h select-pane -L
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l select-pane -R

# Add ctrl and the same h/l move between windows (the "tabs") instead of panes;
# ctrl+alt+n opens a new one.
bind-key -n C-M-h previous-window
bind-key -n C-M-l next-window
bind-key -n C-M-n new-window

# Alt+- splits below, alt+_ splits to the right, both in the current directory.
bind-key -n M-- split-window -v -c "#{pane_current_path}"
bind-key -n M-_ split-window -h -c "#{pane_current_path}"

# --- status bar ---------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-style "fg=#8a8a8a,bg=black"

# Left: the session, as one flat grey badge. No chevron - the left side of the
# bar (session + window tabs) is deliberately flat; only the right side keeps
# the powerline chevrons. Matches ~/.tmux.conf.local.
set -g status-left "#[fg=#e4e4e4,bg=#303030,bold] ❐ #S #[default] "
set -g status-left-length 40

# Right: clock and date on grey, then the host on green (agnoster's clean-git
# badge). No username segment: psmux has no #{user} variable, and #H is the one
# identity format it documents. No battery either - psmux documents no battery
# format variable, so the Linux bar has one and this one doesn't.
# Clock is 12-hour (%I:%M %p) to match ~/.tmux.conf.local.
set -g status-right "#[fg=#8a8a8a,bg=black]#{?client_prefix,⌨ ,}#[fg=#e4e4e4,bg=#303030] %I:%M %p │ %d %b #[fg=black,bg=green,bold] #H #[default]"
set -g status-right-length 80

# --- windows ------------------------------------------------------------------
# The current window is the blue badge - the same "you are here" cue agnoster
# gives the current directory. Flat, no chevrons (see status-left above).
setw -g window-status-separator ""
setw -g window-status-style "fg=#8a8a8a,bg=black"
setw -g window-status-format " #I #W "
setw -g window-status-current-style "fg=black,bg=blue,bold"
setw -g window-status-current-format "#[fg=black,bg=blue,bold] #I #W #[default]"

# --- panes and messages -------------------------------------------------------
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=blue"
set -g message-style "fg=black,bg=yellow,bold"
